HTML
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Lista Dinâmica</title>
<style>
    	* {
			margin: 0;
			padding: 0;
		}
		body {
			background-color: #000;
			color: #fff;
		}
		#app {
			width: 40%;
			margin: 20px auto;
		}
		#fruits>li {
			width: 90%;
			height: 50px;
			background-color: #6ca;
			margin: 4px 0;
			text-align: center;
			font-size: 20px;
			list-style-type: none;
			line-height: 50px;
		}
		#fruits>li>a {
			float: right;
			color: #fff;
			text-decoration: none;
			margin-right: 10px;
		}
		#fruits+div {
			margin-top: 20px;
		}
		#fname {
			width: 70%;
			height: 40px;
			color: #fff;
			border-radius: 8px;
			border: none;
			outline: none;
			font-size: 20px;
			text-align: center;
			vertical-align: middle;
			background-color: #999;
		}
		#ok {
			width: 19%;
			height: 40px;
			color: #fff;
			background-color: #a45;
			border: none;
			outline: none;
			font-size: 16px;
			vertical-align: middle;
		}
    </style>
</head>
<body>
<div id="app">
<ul id="fruits">
<li>Maçã<a href="">×</a></li>
<li>Banana<a href="">×</a></li>
<li>Durião<a href="">×</a></li>
<li>Fruta do Dragão<a href="">×</a></li>
</ul>
<div>
<input id="fname" type="text"/>
<button id="ok">OK</button>
</div>
</div>
<script src="https://cdn.bootcss.com/jquery/3.4.1/jquery.min.js"></script>
<script>
    // 1. If `$` receives a function, that function runs after the page loads.
    $(() => {
        function removeItem(evt) {
            evt.preventDefault()
            // 4. If `$` receives a native JavaScript object, it returns the matching jQuery object.
            $(evt.target).parent().remove()
        }

        function addItem(evt) {
            let fname = $('#fname').val().trim()
            if (fname.length > 0) {
                $('#fruits').append(
                    // 3. If `$` receives a tag string, it creates that element and returns a jQuery object.
                    $('<li>').text(fname).append(
                        $('<a>').attr('href', '').text('×')
                        	.on('click', removeItem)
                    )
                )
            }
            $('#fname').val('')
            // A jQuery object can yield its native DOM object by indexing or with `get`.
            // input.get(0).focus()
            $('#fname')[0].focus()
        }

        // 2. If `$` receives a selector string, it returns the matching jQuery object.
        $('#fruits a').on('click', removeItem)
        $('#ok').on('click', addItem)
        $('#fname').on('keydown', (evt) => {
        	let code = evt.keyCode || evt.which
        	if (code == 13) {
        		addItem(evt) 
        	}
        })
    })
    </script>
</body>
</html>
