name: Validate course examples

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      # v4.2.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Validate Python syntax
        run: python scripts/validate_python_sources.py
      - name: Validate local Markdown links
        run: python scripts/validate_local_links.py
      - name: Run deterministic example tests
        working-directory: Day31-35/code
        run: python -m unittest test_example02
